<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bo vs Geissbock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { text-align: center; background: black; color: white; user-select: none; -webkit-user-select: none; }
        canvas { display: block; margin: 8px auto; max-width: 100%; height: auto; }
        h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.8em;
            color: #aaa;
            margin: 24px 0 0;
            letter-spacing: 2px;
        }
        #touchControls {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px 28px;
        }
        .btn-group { display: flex; gap: 12px; }
        .touch-btn {
            width: 76px;
            height: 76px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 30px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            outline: none;
            transition: background 0.08s;
        }
        .touch-btn:active { background: rgba(255,255,255,0.35); }
        @media (hover: none) and (pointer: coarse) {
            #touchControls { display: flex; }
            h1 { font-size: 1.1em; margin: 12px 0 0; }
        }
    </style>
</head>
<body>
    <h1>Bo vs Geissbock</h1>
    <canvas id="gameCanvas" width="600" height="416"></canvas>
    <div id="touchControls">
        <div class="btn-group">
            <button class="touch-btn" id="btnLeft">&#9664;</button>
            <button class="touch-btn" id="btnRight">&#9654;</button>
        </div>
        <button class="touch-btn" id="btnJump">&#9650;</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const FLOOR = 400;

        // Rewe = human player (arrow keys) — red dot, yellow arms/legs
        const rewe = {
            x: 135, y: 360, width: 30, height: 40,
            speed: 5, dy: 0, gravity: 0.5, jumpPower: -10,
            onGround: false, facing: "right", frame: 0, frameTimer: 0
        };
        let reweScore = 0;
        let cpuTeleportAt = 0; // declared here so spawnFruit() can reference it

        const WIN_SCORE = 20;
        let winner = null; // "Bo" | "Geissbock"
        let winTime = 0;

        const clouds = [
            { x: 60,  y: 70,  r: 28, speed: 0.18 },
            { x: 200, y: 55,  r: 22, speed: 0.12 },
            { x: 350, y: 85,  r: 32, speed: 0.20 },
            { x: 490, y: 60,  r: 25, speed: 0.15 },
        ];

        const skyDom = { x: 680, y: 45, speed: 0.18 };

        // Pre-generate sparse pixel dots for sky texture
        const skyDots = [];
        for (let gx = 8; gx < 600; gx += 16) {
            for (let gy = 8; gy < 400; gy += 16) {
                const h = (gx * 7 + gy * 13) % 31;
                if (h < 7) skyDots.push({
                    x: gx + (h % 4) * 2, y: gy + Math.floor(h / 4) * 2,
                    light: h < 3, phase: (gx * 3 + gy * 5) % 100 / 100
                });
            }
        }
        let skyTick = 0;

        // Geissbock = CPU competitor
        const geissbock = {
            x: 450, y: 360, width: 30, height: 40,
            speed: 5, dy: 0, gravity: 0.5, jumpPower: -11,
            onGround: false, facing: "left", frame: 0, frameTimer: 0
        };
        let geissbockScore = 0;

        const platforms = [
            { x: 220, y: 350, width: 160, height: 10 }, // lower center
            { x: 220, y: 270, width: 160, height: 10 }, // middle center
            { x:  30, y: 190, width: 130, height: 10 }, // upper left
            { x: 440, y: 190, width: 130, height: 10 }, // upper right
        ];

        const FRUIT_SIZE = 32;
        const fruitNames = ["apple", "banana", "cherry", "pear", "pineapple", "strawberry"];
        const fruitImages = {};
        fruitNames.forEach(name => {
            const img = new Image();
            img.src = `img/${name}.png`;
            fruitImages[name] = img;
        });

        const fruit = { x: 0, y: 0, name: "", img: null };

        let audioCtx = null;
        let musicStarted = false;
        let musicStopped = false;
        let musicMaster = null; // master gain for instant silence
        let musicGen = 0; // incremented each startMusic() call to invalidate old loops

        function stopMusic() {
            musicStopped = true;
            if (musicMaster) musicMaster.gain.setValueAtTime(0, audioCtx.currentTime);
        }

        function startMusic() {
            if (musicStarted) return;
            musicStarted = true;
            musicStopped = false;
            const gen = ++musicGen;

            musicMaster = audioCtx.createGain();
            musicMaster.gain.setValueAtTime(1, audioCtx.currentTime);
            musicMaster.connect(audioCtx.destination);

            const BPM  = 162;
            const BEAT = 60 / BPM;

            // "Cave Crawler" — A minor, driving 8th-note hook with syncopated rests
            const intro = [
                // hook: A4 C5 E5 . C5 A4 . E4  (the cave motif)
                [440, 0.5], [523, 0.5], [659, 0.5], [0, 0.5],
                [523, 0.5], [440, 0.5], [0, 0.5], [330, 0.5],
                // A4 B4 C5 . A4~~
                [440, 0.5], [494, 0.5], [523, 0.5], [0, 0.5],
                [440, 1], [0, 1],
            ];
            const phraseA = [
                // hook
                [440, 0.5], [523, 0.5], [659, 0.5], [0, 0.5],
                [523, 0.5], [440, 0.5], [0, 0.5], [330, 0.5],
                // sequence up: F#4 A4 C5 D5
                [370, 0.5], [440, 0.5], [523, 0.5], [587, 0.5],
                // E5~~ . E5
                [659, 1], [0, 0.5], [659, 0.5],
                // hook variation one octave up: E5 G5 A5 . G5 E5 . C5
                [659, 0.5], [784, 0.5], [880, 0.5], [0, 0.5],
                [784, 0.5], [659, 0.5], [0, 0.5], [523, 0.5],
                // stepwise drive home: D5 C5 B4 A4
                [587, 0.5], [523, 0.5], [494, 0.5], [440, 0.5],
                [440, 1.5], [0, 0.5],
            ];
            const bridge = [
                // low cave heartbeat: A3 . A3 B3 C4 . B3 . A3 . A3 D4 A3~~
                [220, 0.5], [0, 0.5], [220, 0.5], [247, 0.5],
                [262, 0.5], [0, 0.5], [247, 0.5], [0, 0.5],
                [220, 0.5], [0, 0.5], [220, 0.5], [294, 0.5],
                [220, 1], [0, 1],
                // ascending drive: A4 B4 C5 D5 E5 . G5 . A5 . G5 E5
                [440, 0.5], [494, 0.5], [523, 0.5], [587, 0.5],
                [659, 0.5], [0, 0.5], [784, 0.5], [0, 0.5],
                [880, 0.5], [0, 0.5], [784, 0.5], [659, 0.5],
                // chromatic rush: Eb5 D5 Db5 C5 B4 Bb4 A4~~
                [622, 0.5], [587, 0.5], [554, 0.5], [523, 0.5],
                [494, 0.5], [466, 0.5], [440, 1],
            ];
            const melody = [
                ...intro,
                ...phraseA, ...phraseA,
                ...bridge,
            ];

            function scheduleLoop(startTime) {
                let t = startTime;
                melody.forEach(([freq, beats]) => {
                    const dur = beats * BEAT;
                    if (freq > 0) {
                        const osc  = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(musicMaster);
                        osc.type = "triangle";
                        osc.frequency.setValueAtTime(freq, t);
                        gain.gain.setValueAtTime(0.20, t);
                        gain.gain.setValueAtTime(0.20, t + dur * 0.75);
                        gain.gain.linearRampToValueAtTime(0, t + dur * 0.90);
                        osc.start(t); osc.stop(t + dur * 0.95);
                        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
                    }
                    t += dur;
                });
                const msUntilEnd = (t - audioCtx.currentTime) * 1000;
                setTimeout(() => {
                    if (musicStopped || musicGen !== gen) return;
                    scheduleLoop(audioCtx.currentTime + 0.1);
                }, Math.max(100, msUntilEnd + 5000));
            }

            scheduleLoop(audioCtx.currentTime + 0.1);
        }

        function playWinSound() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === "suspended") audioCtx.resume();
            const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
            notes.forEach((freq, i) => {
                const t = audioCtx.currentTime + i * 0.18;
                const osc  = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = "square";
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                osc.start(t); osc.stop(t + 0.35);
                osc.onended = () => { osc.disconnect(); gain.disconnect(); };
            });
        }

        function playFruitSound(who) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            // You: high bright sweep (C6→G6); CPU: lower neutral sweep (A5→E6)
            const freqStart = who === "bo" ? 1047 : 740;
            const freqEnd   = who === "bo" ? 1568 : 1109;
            osc.type = who === "bo" ? "triangle" : "sine";
            osc.frequency.setValueAtTime(freqStart, t);
            osc.frequency.exponentialRampToValueAtTime(freqEnd, t + 0.08);
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.35, t + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
            osc.start(t); osc.stop(t + 0.22);
            osc.onended = () => { osc.disconnect(); gain.disconnect(); };
        }

        const particles = [];
        const PARTICLE_COLORS = ["#FF5252","#FF9800","#FFEB3B","#66BB6A","#29B6F6","#CE93D8","#FF80AB"];

        function spawnParticles(cx, cy) {
            for (let i = 0; i < 18; i++) {
                const angle = (Math.PI * 2 / 18) * i + Math.random() * 0.3;
                const speed = 2 + Math.random() * 3.5;
                particles.push({
                    x: cx, y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1.5,
                    size: 4 + Math.random() * 4,
                    color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
                    alpha: 1, life: 1
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.18;
                p.life -= 0.035; p.alpha = Math.max(0, p.life);
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function spawnFruit(forceName) {
            const name = forceName || fruitNames[Math.floor(Math.random() * fruitNames.length)];
            fruit.name = name; fruit.img = fruitImages[name];

            function candidate() {
                // some chance to place the fruit on the floor
                const onFloor = Math.random() < 0.15;
                let fx, fy;
                if (onFloor) {
                    // place only in left quarter (0–150) or right quarter (450–600)
                    const quarter = canvas.width / 4;
                    if (Math.random() < 0.5) {
                        fx = FRUIT_SIZE + Math.random() * (quarter - FRUIT_SIZE * 2);
                    } else {
                        fx = canvas.width * 3 / 4 + Math.random() * (quarter - FRUIT_SIZE * 2);
                    }
                    fy = FLOOR - FRUIT_SIZE;
                } else {
                    const platform = platforms[Math.floor(Math.random() * platforms.length)];
                    fx = platform.x + 4 + Math.random() * (platform.width - FRUIT_SIZE - 8);
                    fy = platform.y - FRUIT_SIZE;
                }
                const fcx = fx + FRUIT_SIZE / 2, fcy = fy + FRUIT_SIZE / 2;
                const dr = Math.hypot(fcx - (rewe.x + 15),  fcy - (rewe.y + 20));
                const dm = Math.hypot(fcx - (geissbock.x + 15), fcy - (geissbock.y + 20));
                return { x: fx, y: fy, dist: Math.min(dr, dm) };
            }

            let best = null;
            for (let i = 0; i < 20; i++) {
                const c = candidate();
                if (!best || c.dist > best.dist) best = c;
                if (c.dist >= 160) { best = c; break; }
            }
            fruit.x = best.x; fruit.y = best.y;
            cpuTeleportAt = (name === 'banana' || name === 'pear') ? Date.now() + 1100 : 0;
        }

        spawnFruit('apple');
        const keys = {};
        let gameStarted = false;
        window.addEventListener("keydown", e => {
            if (winner === "Geissbock" && Date.now() - winTime >= 5000) { resetGame(); return; }
            if (winner === "Geissbock") return;
            if (!audioCtx) audioCtx = new AudioContext();
            else if (audioCtx.state === "suspended") audioCtx.resume();
            startMusic();
            gameStarted = true;
            keys[e.code] = true;
        });
        window.addEventListener("keyup", e => keys[e.code] = false);

        function bindTouchBtn(id, code) {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", e => {
                e.preventDefault();
                if (winner === "Geissbock" && Date.now() - winTime >= 5000) { resetGame(); return; }
                if (winner === "Geissbock") return;
                if (!audioCtx) audioCtx = new AudioContext();
                else if (audioCtx.state === "suspended") audioCtx.resume();
                startMusic();
                gameStarted = true;
                keys[code] = true;
            }, { passive: false });
            btn.addEventListener("touchend",    e => { e.preventDefault(); keys[code] = false; }, { passive: false });
            btn.addEventListener("touchcancel", () => { keys[code] = false; });
        }
        bindTouchBtn("btnLeft",  "ArrowLeft");
        bindTouchBtn("btnJump",  "ArrowUp");
        bindTouchBtn("btnRight", "ArrowRight");

        // ── CPU Bot state (mirrors bo-platformer-01-play.mjs strategy) ─────────────────
        const cpu = { ArrowLeft: false, ArrowRight: false, ArrowUp: false };
        let cpuJumpUntil = 0;
        let cpuJumpDir   = null;
        let cpuLastLevel = 'bottom';

        // ── Teleport magic state ──────────────────────────────────────────────────────────
        // cpuTeleportAt declared above near reweScore (needs to be before spawnFruit())
        const warpParticles = [];
        const teleportFlashes = [];
        const WARP_OUT = ["#FFFFFF","#CC88FF","#8844FF","#FF88FF","#AAAAFF"]; // departure
        const WARP_IN  = ["#00FFFF","#88FFFF","#FFFFFF","#AAFFDD","#CCFFAA"]; // arrival

        function spawnWarpBurst(cx, cy, colors) {
            for (let i = 0; i < 24; i++) {
                const angle = (Math.PI * 2 / 24) * i + Math.random() * 0.15;
                const speed = 2.5 + Math.random() * 5;
                warpParticles.push({
                    x: cx, y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 3 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * Math.PI,
                    life: 1, alpha: 1
                });
            }
            teleportFlashes.push({ x: cx, y: cy, life: 1 });
        }

        function updateWarpParticles() {
            for (let i = warpParticles.length - 1; i >= 0; i--) {
                const p = warpParticles[i];
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.90; p.vy *= 0.90;
                p.life -= 0.04; p.alpha = Math.max(0, p.life);
                if (p.life <= 0) warpParticles.splice(i, 1);
            }
            for (let i = teleportFlashes.length - 1; i >= 0; i--) {
                teleportFlashes[i].life -= 0.07;
                if (teleportFlashes[i].life <= 0) teleportFlashes.splice(i, 1);
            }
        }

        function drawWarpParticles() {
            warpParticles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot + (1 - p.life) * 5);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                const outer = p.size, inner = p.size * 0.3;
                for (let k = 0; k < 8; k++) {
                    const a = (k / 8) * Math.PI * 2;
                    const r = k % 2 === 0 ? outer : inner;
                    if (k === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });
            teleportFlashes.forEach(f => {
                const radius = 15 + 70 * (1 - f.life);
                const alpha = f.life * 0.65;
                const grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, radius);
                grd.addColorStop(0, `rgba(230,200,255,${alpha})`);
                grd.addColorStop(0.45, `rgba(150,60,255,${alpha * 0.55})`);
                grd.addColorStop(1, `rgba(80,0,180,0)`);
                ctx.save();
                ctx.fillStyle = grd;
                ctx.beginPath();
                ctx.arc(f.x, f.y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // Platforms: lower-center y=350 (char y=310), middle-center y=270 (char y=230),
        //            upper-left y=190 (char y=150), upper-right y=190 (char y=150)
        function detectLevel(py) {
            if (py <= 165) return 'top';
            if (py <= 245) return 'middle';
            if (py <= 325) return 'bottom';
            return 'ground';
        }
        function detectFruitLevel(fy) {
            if (fy < 175) return 'top';    // upper platforms (fy≈158)
            if (fy < 260) return 'middle'; // middle center  (fy≈238)
            if (fy < 340) return 'bottom'; // lower center   (fy≈318)
            return 'ground';               // floor level    (fy≈368)
        }

        function updateCPU() {
            const now = Date.now();
            const px = geissbock.x, py = geissbock.y, onGround = geissbock.onGround;
            const fx = fruit.x, fy = fruit.y;

            if (onGround) cpuLastLevel = detectLevel(py);
            const playerLevel = cpuLastLevel;
            const fruitLevel  = detectFruitLevel(fy);
            const playerCx = px + 15, fruitCx = fx + 16;

            cpu.ArrowUp = false;

            if (now < cpuJumpUntil) {
                cpu.ArrowLeft  = cpuJumpDir === 'left';
                cpu.ArrowRight = cpuJumpDir === 'right';
                return;
            }
            if (cpuJumpDir !== null) {
                cpu.ArrowLeft = false; cpu.ArrowRight = false; cpuJumpDir = null;
            }

            function initiateJump(dir, holdMs) {
                if (!onGround) return;
                cpu.ArrowLeft  = dir === 'left';
                cpu.ArrowRight = dir === 'right';
                cpu.ArrowUp    = true;
                cpuJumpDir   = dir;
                cpuJumpUntil = now + holdMs;
            }

            function moveToX(targetX) {
                const d = targetX - playerCx;
                if (d > 8)       { cpu.ArrowRight = true;  cpu.ArrowLeft = false; }
                else if (d < -8) { cpu.ArrowLeft  = true;  cpu.ArrowRight = false; }
                else             { cpu.ArrowLeft  = false; cpu.ArrowRight = false; }
                return Math.abs(d);
            }

            if (playerLevel === fruitLevel) {
                // Same level — walk directly to the fruit
                moveToX(fruitCx);

            } else if (playerLevel === 'ground') {
                // Step 1: jump onto lower-center platform (x=220–380, center=300)
                const dist = moveToX(300);
                if (dist < 30 && onGround) initiateJump(null, 0);

            } else if (playerLevel === 'bottom') {
                if (fruitLevel === 'ground') {
                    // Walk off the platform edge toward the fruit side
                    if (fruitCx > playerCx) { cpu.ArrowRight = true; cpu.ArrowLeft = false; }
                    else                    { cpu.ArrowLeft  = true; cpu.ArrowRight = false; }
                } else {
                    // Jump straight up to reach middle-center platform
                    const dist = moveToX(300);
                    if (dist < 60 && onGround) initiateJump(null, 0);
                }

            } else if (playerLevel === 'middle') {
                if (fruitLevel === 'top') {
                    // Jump diagonally to upper-left (x≈95) or upper-right (x≈505)
                    // From x≈235 moving left 29 frames → lands at x≈90 (upper-left ✓)
                    // From x≈365 moving right 29 frames → lands at x≈510 (upper-right ✓)
                    if (fruitCx <= 300) {
                        const dist = moveToX(235);
                        if (dist < 20 && onGround) initiateJump('left', 580);
                    } else {
                        const dist = moveToX(365);
                        if (dist < 20 && onGround) initiateJump('right', 580);
                    }
                } else if (fruitLevel === 'ground') {
                    // Fruit is on the floor — walk off toward fruit side
                    if (fruitCx > playerCx) { cpu.ArrowRight = true; cpu.ArrowLeft = false; }
                    else                    { cpu.ArrowLeft  = true; cpu.ArrowRight = false; }
                } else {
                    // Fruit is lower — walk off platform edge to fall down
                    cpu.ArrowLeft = true; cpu.ArrowRight = false;
                }

            } else if (playerLevel === 'top') {
                // Walk toward canvas centre so we fall off and descend
                if (playerCx < 300) {
                    cpu.ArrowRight = true; cpu.ArrowLeft = false;
                } else {
                    cpu.ArrowLeft = true; cpu.ArrowRight = false;
                }
            }
        }

        // ── Shared character physics ───────────────────────────────────────────
        function updateCharacter(char, inp) {
            const moving = inp.ArrowRight || inp.ArrowLeft;
            if (inp.ArrowRight) { char.x += char.speed; char.facing = "right"; }
            if (inp.ArrowLeft)  { char.x -= char.speed; char.facing = "left"; }

            if (!char.onGround) {
                char.frame = 3; char.frameTimer = 0;
            } else if (moving) {
                char.frameTimer++;
                if (char.frameTimer >= 5) { char.frameTimer = 0; char.frame = char.frame === 1 ? 2 : 1; }
            } else {
                char.frame = 0; char.frameTimer = 0;
            }

            if (char.x < 0) char.x = 0;
            if (char.x + char.width > canvas.width) char.x = canvas.width - char.width;

            char.dy += char.gravity; char.y += char.dy; char.onGround = false;

            platforms.forEach(platform => {
                if (
                    char.x < platform.x + platform.width &&
                    char.x + char.width > platform.x &&
                    char.y + char.height > platform.y &&
                    char.y + char.height - char.dy <= platform.y
                ) {
                    char.y = platform.y - char.height; char.dy = 0; char.onGround = true;
                }
            });

            if (char.y + char.height > FLOOR) {
                char.y = FLOOR - char.height; char.dy = 0; char.onGround = true;
            }

            if (inp.ArrowUp && char.onGround) {
                char.dy = char.jumpPower; char.onGround = false;
            }
        }

        function collidesWithFruit(char) {
            return (
                char.x < fruit.x + FRUIT_SIZE && char.x + char.width > fruit.x &&
                char.y < fruit.y + FRUIT_SIZE && char.y + char.height > fruit.y
            );
        }

        function update() {
            if (winner) return;
            if (!gameStarted) return;

            // Geissbock magic teleport (apple or banana)
            if (cpuTeleportAt > 0 && Date.now() >= cpuTeleportAt) {
                spawnWarpBurst(geissbock.x + geissbock.width / 2, geissbock.y + geissbock.height / 2, WARP_OUT);
                geissbock.x = fruit.x + FRUIT_SIZE / 2 - geissbock.width / 2;
                geissbock.y = fruit.y + FRUIT_SIZE - geissbock.height;
                geissbock.dy = 0; geissbock.onGround = true;
                spawnWarpBurst(geissbock.x + geissbock.width / 2, geissbock.y + geissbock.height / 2, WARP_IN);
                cpuTeleportAt = 0; cpuJumpUntil = 0; cpuJumpDir = null;
                cpuLastLevel = detectLevel(geissbock.y);
            }

            updateCPU();
            const cpuInput = { ArrowLeft: cpu.ArrowLeft, ArrowRight: cpu.ArrowRight, ArrowUp: cpu.ArrowUp };
            cpu.ArrowUp = false; // consume jump tap

            geissbock.speed = geissbock.onGround ? 3 : 5;
            updateCharacter(geissbock, cpuInput);
            updateCharacter(rewe, keys);
            updateParticles();
            updateWarpParticles();

            if (collidesWithFruit(geissbock)) {
                geissbockScore++;
                spawnParticles(fruit.x + FRUIT_SIZE / 2, fruit.y + FRUIT_SIZE / 2);
                playFruitSound("geissbock");
                if (geissbockScore >= WIN_SCORE) { winner = "Geissbock"; winTime = Date.now(); stopMusic(); playWinSound(); return; }
                spawnFruit();
            } else if (collidesWithFruit(rewe)) {
                reweScore++;
                spawnParticles(fruit.x + FRUIT_SIZE / 2, fruit.y + FRUIT_SIZE / 2);
                playFruitSound("bo");
                if (reweScore >= WIN_SCORE) { winner = "Bo"; stopMusic(); playWinSound(); return; }
                spawnFruit();
            }
        }

        // ── Draw Geissbock ────────────────────────────────────────────────────────
        function drawGeissbockChar(ox, y, frame) {
            const running = frame === 1 || frame === 2;
            if (running) y -= 2;

            const BROWN = "#BE7E40";
            const TAN   = "#E8B870";
            const HORN  = "#9A6035";
            const HOOF  = "#7A4A28";

            function arc(c, x, cy, rx, ry) {
                ctx.fillStyle = c;
                ctx.beginPath();
                ctx.ellipse(x, cy, rx, ry !== undefined ? ry : rx, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            function rect(c, x, ry, w, h) { ctx.fillStyle = c; ctx.fillRect(x, ry, w, h); }
            function tri(c, x1, y1, x2, y2, x3, y3) {
                ctx.fillStyle = c;
                ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.fill();
            }

            function drawHead() {
                // Horns
                tri(HORN, ox+5,  y+11, ox+3,  y-6, ox+11, y+5);
                tri(HORN, ox+15, y+11, ox+11, y-6, ox+21, y+5);
                // Flat ear pressed to head
                rect(BROWN, ox,     y+12, 5, 7);
                rect(TAN,   ox+1,   y+13, 3, 5);
                // Head - blockier
                arc(BROWN, ox + 13, y + 15, 12, 11);
                // Wide strong muzzle
                arc(TAN, ox + 22, y + 19, 7, 6);
                // Wide flared nostrils
                rect("#000", ox + 21, y + 15, 4, 2);
                rect("#000", ox + 26, y + 15, 2, 2);
                // Heavy angry brow (inner end lower = scowl)
                ctx.fillStyle = HORN;
                ctx.beginPath();
                ctx.moveTo(ox+12, y+8);
                ctx.lineTo(ox+25, y+5);
                ctx.lineTo(ox+25, y+8);
                ctx.lineTo(ox+12, y+12);
                ctx.fill();
                // Eye - narrow under heavy brow
                arc("#fff", ox + 18, y + 13, 4, 3);
                arc("#111", ox + 19, y + 13, 2.5);
            }

            function drawBody() {
                arc(BROWN, ox + 15, y + 30, 11, 9);
                arc(TAN,   ox + 17, y + 33,  4, 4);
            }

            if (frame === 0) {
                rect(BROWN, ox - 2,  y + 22, 6, 9);
                rect(BROWN, ox + 26, y + 22, 6, 9);
                drawBody();
                rect(BROWN, ox + 7,  y + 35, 6, 8);
                rect(BROWN, ox + 17, y + 35, 6, 8);
                rect(HOOF,  ox + 6,  y + 42, 8, 3);
                rect(HOOF,  ox + 16, y + 42, 8, 3);
                drawHead();
            } else if (running) {
                const rightLeads = frame === 1;
                const bArmX = rightLeads ? ox - 2 : ox + 26;
                const fArmX = rightLeads ? ox + 26 : ox - 2;
                const bLegX = rightLeads ? ox + 7  : ox + 17;
                const fLegX = rightLeads ? ox + 17 : ox + 7;

                rect(BROWN, bArmX,     y + 27, 6, 7);
                rect(BROWN, bLegX,     y + 35, 6, 7);
                rect(HOOF,  bLegX - 1, y + 40, 8, 3);
                drawBody();
                rect(BROWN, fArmX,     y + 19, 6, 7);
                rect(BROWN, fLegX,     y + 31, 6, 9);
                rect(HOOF,  fLegX - 1, y + 38, 8, 3);
                drawHead();
            } else if (frame === 3) {
                rect(BROWN, ox - 4,  y + 13, 6, 7);
                rect(BROWN, ox + 28, y + 13, 6, 7);
                drawBody();
                rect(BROWN, ox + 7,  y + 34, 6, 7);
                rect(HOOF,  ox + 6,  y + 40, 8, 3);
                rect(BROWN, ox + 17, y + 30, 6, 7);
                rect(HOOF,  ox + 16, y + 36, 8, 3);
                drawHead();
            }
        }

        function drawGeissbock() {
            const x = Math.floor(geissbock.x);
            const y = Math.floor(geissbock.y);
            const running = geissbock.frame === 1 || geissbock.frame === 2;
            const cx = x + geissbock.width / 2;
            const cy = y + geissbock.height * 0.55;

            ctx.save();
            if (geissbock.facing === "left") {
                ctx.translate(x + geissbock.width, 0);
                ctx.scale(-1, 1);
                if (running) {
                    ctx.translate(geissbock.width / 2, cy);
                    ctx.rotate(0.18);
                    ctx.translate(-geissbock.width / 2, -cy);
                }
                drawGeissbockChar(0, y, geissbock.frame);
            } else {
                if (running) {
                    ctx.translate(cx, cy);
                    ctx.rotate(0.18);
                    ctx.translate(-cx, -cy);
                }
                drawGeissbockChar(x, y, geissbock.frame);
            }
            ctx.restore();
        }

        // ── Draw Rewe (red dot, yellow arms/legs) ─────────────────────────────
        function drawReweChar(ox, y, frame) {
            const running = frame === 1 || frame === 2;
            if (running) y -= 2;
            const cx = ox + 15;

            function drawBody() {
                ctx.fillStyle = "#DD2222";
                ctx.beginPath();
                ctx.arc(cx, y + 13, 13, 0, Math.PI * 2);
                ctx.fill();
                // Sunglasses
                ctx.fillStyle = "#111";
                ctx.fillRect(cx - 9, y + 7, 8, 6);   // left lens
                ctx.fillRect(cx + 1,  y + 7, 8, 6);  // right lens
                ctx.fillRect(cx - 1, y + 8, 2, 3);   // bridge
                ctx.fillRect(cx - 13, y + 8, 4, 2);  // left temple
                ctx.fillRect(cx + 9,  y + 8, 4, 2);  // right temple
                ctx.fillStyle = "#4488FF";
                ctx.globalAlpha = 0.35;
                ctx.fillRect(cx - 8, y + 8, 3, 3);   // left lens shine
                ctx.fillRect(cx + 2,  y + 8, 3, 3);  // right lens shine
                ctx.globalAlpha = 1;
                // Smile
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, y + 15, 5, 0.2, Math.PI - 0.2);
                ctx.stroke();
            }

            ctx.fillStyle = "#FFD700";

            if (frame === 0) {
                // Idle: arms to sides, legs down
                ctx.fillRect(ox - 4, y + 14, 9,  5);   // left arm
                ctx.fillRect(ox + 26, y + 14, 9, 5);   // right arm
                ctx.fillRect(ox + 7,  y + 25, 7, 13);  // left leg
                ctx.fillRect(ox + 17, y + 25, 7, 13);  // right leg
                drawBody();
            } else if (running) {
                const rightLeads = frame === 1;
                const backArmX  = rightLeads ? ox - 4  : ox + 26;
                const frontArmX = rightLeads ? ox + 26 : ox - 4;
                const backLegX  = rightLeads ? ox + 7  : ox + 17;
                const frontLegX = rightLeads ? ox + 17 : ox + 7;

                // Back limbs (behind body)
                ctx.fillRect(backArmX, y + 17, 9, 5);
                ctx.fillRect(backLegX, y + 26, 7, 8);
                drawBody();
                // Front limbs (in front of body)
                ctx.fillStyle = "#FFD700";
                ctx.fillRect(frontArmX, y + 11, 9, 5);
                ctx.fillRect(frontLegX, y + 20, 7, 12);
            } else if (frame === 3) {
                // Jump: arms raised, legs tucked
                ctx.fillRect(ox - 6, y + 5,  9, 5);   // left arm raised
                ctx.fillRect(ox + 28, y + 5, 9, 5);   // right arm raised
                ctx.fillRect(ox + 7,  y + 26, 7, 8);  // back leg dropped
                drawBody();
                ctx.fillStyle = "#FFD700";
                ctx.fillRect(ox + 17, y + 22, 7, 8);  // front leg tucked
            }
        }

        function drawRewe() {
            const x = Math.floor(rewe.x);
            const y = Math.floor(rewe.y);
            const running = rewe.frame === 1 || rewe.frame === 2;
            const cx = x + rewe.width / 2;
            const cy = y + rewe.height * 0.55;

            ctx.save();
            if (rewe.facing === "left") {
                ctx.translate(x + rewe.width, 0);
                ctx.scale(-1, 1);
                if (running) {
                    ctx.translate(rewe.width / 2, cy);
                    ctx.rotate(0.18);
                    ctx.translate(-rewe.width / 2, -cy);
                }
                drawReweChar(0, y, rewe.frame);
            } else {
                if (running) {
                    ctx.translate(cx, cy);
                    ctx.rotate(0.18);
                    ctx.translate(-cx, -cy);
                }
                drawReweChar(x, y, rewe.frame);
            }
            ctx.restore();
        }

        // ── Draw scene ────────────────────────────────────────────────────────
        function drawCloud(x, y, r) {
            ctx.fillStyle = "rgba(160,160,160,0.85)";
            ctx.beginPath();
            ctx.arc(x,       y,     r,       0, Math.PI * 2);
            ctx.arc(x + r,   y - 8, r * 0.7, 0, Math.PI * 2);
            ctx.arc(x - r,   y - 4, r * 0.6, 0, Math.PI * 2);
            ctx.arc(x + r*1.7, y,   r * 0.55, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSkyDom(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(1, 0.75);
            // Cloudy grey-white palette
            const WH = "rgba(160,160,160,0.85)"; // matches cloud colour exactly
            const SH = "rgba(25,30,45,0.80)";    // near-black shadow / tracery voids

            // Draw one tower centred at tx
            function drawTower(tx) {
                // --- Spire needle and finial (  |  /  ---  /  |  ) ---
                ctx.fillStyle = WH;
                ctx.fillRect(tx - 1,  0, 2,  5);  // |  needle tip
                ctx.fillRect(tx - 5,  5, 10, 2);  // ---  finial bar
                ctx.fillRect(tx - 1,  7, 2,  5);  // |  neck

                // --- Outer spire triangle ---
                ctx.fillStyle = WH;
                ctx.beginPath();
                ctx.moveTo(tx,       12);
                ctx.lineTo(tx - 16,  56);
                ctx.lineTo(tx + 16,  56);
                ctx.closePath();
                ctx.fill();

                // --- Level-1 tracery void (large dark inner triangle) ---
                ctx.fillStyle = SH;
                ctx.beginPath();
                ctx.moveTo(tx,       16);
                ctx.lineTo(tx - 10,  51);
                ctx.lineTo(tx + 10,  51);
                ctx.closePath();
                ctx.fill();

                // --- Level-2 sub-spire inside the void (white) ---
                ctx.fillStyle = WH;
                ctx.beginPath();
                ctx.moveTo(tx,       19);
                ctx.lineTo(tx -  6,  40);
                ctx.lineTo(tx +  6,  40);
                ctx.closePath();
                ctx.fill();

                // --- Level-3 inner void (darkest, smallest triangle) ---
                ctx.fillStyle = SH;
                ctx.beginPath();
                ctx.moveTo(tx,       23);
                ctx.lineTo(tx -  3,  35);
                ctx.lineTo(tx +  3,  35);
                ctx.closePath();
                ctx.fill();

                // --- Tower body rectangle ---
                ctx.fillStyle = WH;
                ctx.fillRect(tx - 16, 56, 32, 42);

                // --- Buttress dividers (| | | pattern) ---
                ctx.fillStyle = SH;
                ctx.fillRect(tx - 11, 56,  2, 42); // left inner slot
                ctx.fillRect(tx +  9, 56,  2, 42); // right inner slot

                // --- Tower windows ---
                ctx.fillRect(tx - 14, 62,  9,  8); // left window
                ctx.fillRect(tx +  5, 62,  9,  8); // right window

                // --- Base portal arch (pointed) ---
                ctx.beginPath();
                ctx.moveTo(tx - 5, 98);
                ctx.lineTo(tx,     89);
                ctx.lineTo(tx + 5, 98);
                ctx.closePath();
                ctx.fill();
            }

            // Left tower (centre x=18), right tower (centre x=61)
            drawTower(18);
            drawTower(61);

            // --- Nave gable between the towers ---
            ctx.fillStyle = WH;
            ctx.beginPath();
            ctx.moveTo(39.5, 36);
            ctx.lineTo(28,   56);
            ctx.lineTo(51,   56);
            ctx.closePath();
            ctx.fill();
            // Nave body
            ctx.fillRect(28, 56, 23, 42);
            // Nave rose window
            ctx.fillStyle = SH;
            ctx.fillRect(31, 63, 16, 10);
            // Nave portal arch
            ctx.beginPath();
            ctx.moveTo(34,   98);
            ctx.lineTo(39.5, 89);
            ctx.lineTo(45,   98);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        // Palette of brick face colours — varied reds, oranges, earthy tones
        const BRICK_COLORS = [
            "#9B3A18", "#8B2E10", "#A54520", "#7A2E10",
            "#B05225", "#C0602A", "#7C3318", "#A03820",
        ];
        const MORTAR_COLOR = "#2E1A0A";

        function drawBrickWall(wx, wy, ww, wh, brickW, brickH) {
            // Fill entire area with mortar colour first
            ctx.fillStyle = MORTAR_COLOR;
            ctx.fillRect(wx, wy, ww, wh);

            for (let row = 0; row * brickH < wh; row++) {
                const by = wy + row * brickH;
                const offset = (row % 2 === 0) ? 0 : Math.floor(brickW / 2);

                for (let col = -1; col * brickW < ww + brickW; col++) {
                    const bx = wx + col * brickW + offset;

                    // Clip brick face to wall bounds (1px mortar gap)
                    const fx = Math.max(bx + 1, wx + 1);
                    const fy = Math.max(by + 1, wy + 1);
                    const fw = Math.min(bx + brickW - 1, wx + ww - 1) - fx;
                    const fh = Math.min(by + brickH - 1, wy + wh - 1) - fy;
                    if (fw <= 0 || fh <= 0) continue;

                    // Pick a deterministic colour per brick position
                    const colorIdx = ((row * 7 + col * 3) ^ (col * 5)) & 7;
                    ctx.fillStyle = BRICK_COLORS[colorIdx];
                    ctx.fillRect(fx, fy, fw, fh);

                    // Inner texture: faint diagonal grain lines
                    ctx.fillStyle = "rgba(0,0,0,0.10)";
                    for (let g = 2; g < fw + fh; g += 4) {
                        const lx1 = fx + Math.min(g, fw - 1);
                        const ly1 = fy;
                        const lx2 = fx;
                        const ly2 = fy + Math.min(g, fh - 1);
                        if (lx1 >= fx && ly2 >= fy)
                            ctx.fillRect(Math.min(lx1, fx + fw - 1), ly1, 1, 1);
                    }

                    // Specular spot top-left (small bright fleck)
                    if (fw >= 4 && fh >= 3) {
                        ctx.fillStyle = "rgba(255,200,150,0.22)";
                        ctx.fillRect(fx + 1, fy + 1, Math.min(4, fw - 2), 1);
                        ctx.fillRect(fx + 1, fy + 1, 1, Math.min(2, fh - 2));
                    }

                    // Highlight: top edge
                    ctx.fillStyle = "rgba(255,160,90,0.28)";
                    ctx.fillRect(fx, fy, fw, 1);

                    // Shadow: bottom + right edges
                    ctx.fillStyle = "rgba(0,0,0,0.40)";
                    ctx.fillRect(fx, fy + fh - 1, fw, 1);
                    ctx.fillRect(fx + fw - 1, fy, 1, fh);

                    // Occasional dark speckle (weathering)
                    if (colorIdx % 3 === 0 && fw > 6) {
                        ctx.fillStyle = "rgba(0,0,0,0.18)";
                        ctx.fillRect(fx + Math.floor(fw * 0.55), fy + 1, 2, 2);
                    }
                }
            }
        }

        function drawGround() {
            const gw = canvas.width, gy = FLOOR, gh = canvas.height - FLOOR;
            drawBrickWall(0, gy, gw, gh, 20, 10);
        }

        function drawPlatform(p) {
            drawBrickWall(p.x, p.y, p.width, p.height, 16, p.height);
        }

        function draw() {
            // Sky
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, 0, canvas.width, FLOOR);
            skyTick += 0.012;
            skyDots.forEach(d => {
                const alpha = 0.25 + 0.75 * (0.5 + 0.5 * Math.sin(skyTick * Math.PI * 2 + d.phase * Math.PI * 2));
                ctx.fillStyle = d.light ? `rgba(220,235,255,${alpha.toFixed(2)})` : `rgba(150,180,220,${alpha.toFixed(2)})`;
                ctx.fillRect(d.x, d.y, 3, 3);
            });

            clouds.forEach(c => {
                c.x += c.speed;
                if (c.x - c.r * 2 > canvas.width) c.x = -c.r * 2;
                drawCloud(c.x, c.y, c.r);
            });

            skyDom.x += skyDom.speed;
            if (skyDom.x > canvas.width + 80) skyDom.x = -80;
            drawSkyDom(skyDom.x, skyDom.y);

            drawGeissbock();
            drawRewe();

            drawGround();
            platforms.forEach(p => drawPlatform(p));

            if (fruit.img && fruit.img.complete && fruit.img.naturalWidth > 0) {
                ctx.drawImage(fruit.img, fruit.x, fruit.y, FRUIT_SIZE, FRUIT_SIZE);
            } else {
                ctx.fillStyle = "gold";
                ctx.beginPath();
                ctx.arc(fruit.x + FRUIT_SIZE / 2, fruit.y + FRUIT_SIZE / 2, FRUIT_SIZE / 2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawParticles();
            drawWarpParticles();

            // Scores
            ctx.fillStyle = "rgba(180,20,20,0.75)";
            ctx.fillRect(6, 6, 145, 30);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 16px Arial";
            ctx.textAlign = "left";
            ctx.fillText("🔴 You: " + reweScore, 14, 27);

            ctx.fillStyle = "rgba(190,126,64,0.5)";
            ctx.fillRect(canvas.width - 151, 6, 145, 30);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 16px Arial";
            ctx.textAlign = "left";
            ctx.fillText("🎮 CPU: " + geissbockScore, canvas.width - 143, 27);

            if (!gameStarted) {
                const bx = 20, by = 135, bw = 560, bh = 25;
                // drop shadow
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.fillRect(bx + 5, by + 5, bw, bh);
                // background
                ctx.fillStyle = "#00003a";
                ctx.fillRect(bx, by, bw, bh);
                // outer border
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 3;
                ctx.strokeRect(bx + 1.5, by + 1.5, bw - 3, bh - 3);
                // inner border
                ctx.strokeStyle = "#6666cc";
                ctx.lineWidth = 1;
                ctx.strokeRect(bx + 7, by + 7, bw - 14, bh - 14);
                // text
                ctx.fillStyle = "#ffffff";
                ctx.textAlign = "left";
                ctx.font = "10px 'Press Start 2P', monospace";
                ctx.fillText("Geissbock will do magic sometimes!", bx + 18, by + 18);
                // blinking arrow
                if (Math.floor(skyTick * 4) % 2 === 0) {
                    ctx.fillText(">", bx + bw - 26, by + bh - 10);
                }
            }

            if (winner) {
                ctx.fillStyle = "rgba(0,0,0,0.65)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.textAlign = "center";
                const cx = canvas.width / 2, cy = canvas.height / 2;
                ctx.fillStyle = "#FFD700";
                ctx.font = "28px 'Press Start 2P'";
                ctx.fillText(winner + " wins!", cx, winner === "Geissbock" ? cy - 40 : cy);
                if (winner === "Geissbock") {
                    const elapsed = Date.now() - winTime;
                    if (elapsed >= 5000) {
                        const countdown = Math.max(0, 10 - Math.floor((elapsed - 5000) / 1000));
                        if (Math.floor(skyTick * 3) % 2 === 0) {
                            ctx.fillStyle = "#ffffff";
                            ctx.font = "10px 'Press Start 2P'";
                            ctx.fillText("Press key to retry", cx, cy + 14);
                        }
                        ctx.fillStyle = countdown <= 3 ? "#ff6666" : "#FFD700";
                        ctx.font = "36px 'Press Start 2P'";
                        ctx.fillText(countdown, cx, cy + 72);
                    }
                }
            }
        }

        function resetGame() {
            Object.assign(rewe,  { x: 135, y: 360, dy: 0, onGround: false, facing: "right", frame: 0, frameTimer: 0 });
            Object.assign(geissbock, { x: 450, y: 360, dy: 0, onGround: false, facing: "left", frame: 0, frameTimer: 0 });
            reweScore = 0; geissbockScore = 0;
            winner = null; winTime = 0;
            particles.length = 0;
            warpParticles.length = 0; teleportFlashes.length = 0; cpuTeleportAt = 0;
            musicStarted = false;
            gameStarted = true;
            spawnFruit();
            if (audioCtx) { if (audioCtx.state === "suspended") audioCtx.resume(); startMusic(); }
        }

        document.addEventListener("visibilitychange", () => {
            if (!audioCtx) return;
            if (document.hidden) {
                audioCtx.suspend();
            } else if (musicStarted && !musicStopped) {
                audioCtx.resume();
            }
        });

        function gameLoop() {
            window.setTimeout(() => {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }, 1000 / 60);
        }

        gameLoop();
    </script>
</body>
