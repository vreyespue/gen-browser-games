<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click the Fruit Game</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; }
        #game-container {
            position: relative;
            width: 90vw; /* Adjusted for mobile view */
            height: 90vw; /* Adjusted for mobile view */
            max-width: 400px;
            max-height: 400px;
            border: 2px solid black;
            margin: 20px auto;
        }
        #box {
            width: 12.5vw; /* Adjusted for mobile view */
            height: 12.5vw; /* Adjusted for mobile view */
            max-width: 50px;
            max-height: 50px;
            position: absolute;
            cursor: pointer;
            background-position: center;
            background-repeat: no-repeat;
        }
        #coolspot {
            position: relative;
            margin: 20px auto;
            width: 250px;
            height: 250px;
            background-image: url('img/coolspot_b.png');
            background-size: contain;
            background-repeat: no-repeat;
        }
        .click-effect {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 220, 50, 0.6);
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: pop 0.4s ease-out forwards;
        }
        @keyframes pop {
            0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            60%  { transform: translate(-50%, -50%) scale(1.4); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <h1>Click the Fruit!</h1>
    <p>Score: <span id="score">0</span></p>
    <p>Time Left: <span id="time">30</span>s</p>
    <div id="game-container">
        <div id="box"></div>
    </div>
    <div id="coolspot"></div>
    <script>
        let score = 0;
        let timeLeft = 30;
        const scoreDisplay = document.getElementById("score");
        const timeDisplay = document.getElementById("time");
        const box = document.getElementById("box");
        const gameContainer = document.getElementById("game-container");

        const images = [
            'img/banana.png',
            'img/apple.png',
            'img/cherry.png',
            'img/pear.png',
            'img/pineapple.png',
            'img/strawberry.png'
        ];

        function moveBox() {
            const maxX = gameContainer.clientWidth - box.clientWidth;
            const maxY = gameContainer.clientHeight - box.clientHeight;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            const randomImage = images[Math.floor(Math.random() * images.length)];
            box.style.left = `${randomX}px`;
            box.style.top = `${randomY}px`;
            box.style.backgroundImage = `url(${randomImage})`;
            box.style.backgroundSize = 'contain';
        }

        box.addEventListener("click", (e) => {
            if (timeLeft > 0) {
                const rect = gameContainer.getBoundingClientRect();
                const effect = document.createElement("div");
                effect.className = "click-effect";
                effect.style.left = `${e.clientX - rect.left}px`;
                effect.style.top = `${e.clientY - rect.top}px`;
                gameContainer.appendChild(effect);
                effect.addEventListener("animationend", () => effect.remove());

                score++;
                scoreDisplay.textContent = score;
                moveBox();
            }
        });

        const timer = setInterval(() => {
            timeLeft--;
            timeDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                alert(`Game Over! Your score: ${score}`);
            }
        }, 1000);

        moveBox();
    </script>
</body>
</html>
